services:
  backend:
    build:
      context: .
      dockerfile: containers/Dockerfile  # Django 用の Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONPATH=/app/src
      # docker-compose 内では Redis サービス名 "redis" で接続する
      # (.env 側の REDIS_URL より優先される)
      - REDIS_URL=redis://redis:6379
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis  # Redis コンテナが先に起動している必要がある

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile  # React 用の Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    ports:
      - "5173:5173"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
